<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Link → QR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* keep it minimalist; Tailwind does most of the work */
      html,
      body {
        height: 100%;
      }
    </style>
  </head>
  <body class="min-h-screen bg-white text-slate-900 antialiased">
    <main class="mx-auto w-full max-w-5xl px-4 py-10">
      <header class="mb-6">
        <h1 class="text-2xl font-semibold tracking-tight">Link → QR</h1>
        <p class="mt-1 text-sm text-slate-600">Paste a link, generate a QR code, download as PNG.</p>
      </header>

      <section class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
        <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
          <!-- Left: input -->
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-medium text-slate-600" for="link">Link</label>
              <div class="mt-2 flex flex-col gap-2 sm:flex-row">
          <input
            id="link"
                  class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"
            type="url"
            inputmode="url"
            autocomplete="off"
            spellcheck="false"
            placeholder="https://example.com"
          />
                <button
                  id="generate"
                  class="inline-flex items-center justify-center rounded-xl bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-300"
                  type="button"
                >
                  Generate
                </button>
              </div>
              <p id="status" class="mt-2 min-h-[1.25rem] text-xs text-slate-600" role="status" aria-live="polite"></p>
            </div>

            <div class="grid grid-cols-1 gap-3 sm:grid-cols-3">
              <div>
                <label class="block text-xs font-medium text-slate-600" for="size">Size</label>
                <select id="size" class="mt-2 w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200">
              <option value="192">192</option>
              <option value="256" selected>256</option>
              <option value="320">320</option>
              <option value="384">384</option>
              <option value="512">512</option>
            </select>
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-600" for="margin">Margin</label>
                <select id="margin" class="mt-2 w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200">
              <option value="0">0</option>
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="4">4</option>
              <option value="8">8</option>
            </select>
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-600" for="eclevel">Error correction</label>
                <select id="eclevel" class="mt-2 w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200">
              <option value="L">L</option>
              <option value="M" selected>M</option>
              <option value="Q">Q</option>
              <option value="H">H</option>
            </select>
              </div>
            </div>

            <div class="flex flex-wrap items-center gap-2">
              <button
                id="copy"
                class="inline-flex items-center justify-center rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-900 hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50"
                type="button"
                disabled
              >
                Copy PNG
              </button>
              <a
                id="download"
                class="inline-flex items-center justify-center rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-900 hover:bg-slate-50 aria-disabled:cursor-not-allowed aria-disabled:opacity-50"
                download="qr.png"
                href="#"
                aria-disabled="true"
              >
                Download PNG
              </a>
              <button
                id="clear"
                class="inline-flex items-center justify-center rounded-xl border border-rose-200 bg-rose-50 px-3 py-2 text-sm font-medium text-rose-700 hover:bg-rose-100"
                type="button"
              >
                Clear
              </button>
            </div>
          </div>

          <!-- Right: QR preview -->
          <div class="flex items-start justify-center md:justify-end">
            <div class="w-full max-w-sm rounded-2xl border border-slate-200 bg-slate-50 p-4">
              <div class="flex items-center justify-between">
                <div>
                  <p class="text-sm font-medium text-slate-900">QR Preview</p>
                  <p class="text-xs text-slate-600">Scan this code</p>
                </div>
              </div>
              <div class="mt-4 grid place-items-center rounded-xl bg-white p-4">
                <div id="qrcode" class="select-none" aria-label="QR code preview"></div>
              </div>
              <p class="mt-3 text-xs text-slate-500">Tip: Press Enter to generate.</p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Use the canonical davidshimjs build to avoid npm path issues -->
    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
